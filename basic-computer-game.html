<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BASIC ARENA: Computer Knowledge</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Exo:wght@300;400;600&family=Orbitron:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-red: #ff003c;
            --neon-green: #39ff14;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image:
                linear-gradient(rgba(5, 5, 5, 0.8), rgba(5, 5, 5, 0.8)),
                url('https://i.postimg.cc/xdyjhjZ4/Castlevania-Nocturne-Season-1-But-Why-Tho.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            font-family: 'Exo', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 800px;
            text-align: center;
            z-index: 10;
        }

        .glitch-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--neon-blue);
            text-shadow: 0 0 20px var(--neon-blue);
            margin-bottom: 0.5rem;
            letter-spacing: 5px;
        }

        .subtitle {
            color: var(--neon-purple);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 3rem;
        }

        .quiz-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .terror-frame::before,
        .terror-frame::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid var(--neon-red);
            filter: drop-shadow(0 0 5px var(--neon-red));
        }

        .terror-frame::before {
            top: -5px;
            left: -5px;
            border-right: none;
            border-bottom: none;
        }

        .terror-frame::after {
            bottom: -5px;
            right: -5px;
            border-left: none;
            border-top: none;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 2rem;
            border-radius: 2px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            width: 20%;
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
            transition: width 0.5s ease;
        }

        .question-text {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            line-height: 1.4;
            min-height: 4rem;
        }

        .answer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .answer-btn {
            background: transparent;
            border: 1px solid var(--neon-blue);
            padding: 1.2rem;
            color: #fff;
            cursor: pointer;
            font-family: 'Exo', sans-serif;
            font-size: 1.1rem;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .answer-btn:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: #fff;
            box-shadow: 0 0 20px var(--neon-blue);
            transform: translateY(-3px);
        }

        .answer-btn.correct {
            background: var(--neon-green) !important;
            border-color: var(--neon-green) !important;
            color: #000 !important;
            box-shadow: 0 0 20px var(--neon-green) !important;
        }

        .answer-btn.wrong {
            background: var(--neon-red) !important;
            border-color: var(--neon-red) !important;
            box-shadow: 0 0 20px var(--neon-red) !important;
        }

        .result-screen {
            display: none;
        }

        .score-value {
            font-size: 5rem;
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-blue);
            text-shadow: 0 0 30px var(--neon-blue);
            margin: 1rem 0;
        }

        .neon-button {
            display: inline-block;
            margin-top: 2rem;
            padding: 1rem 2rem;
            border: 2px solid var(--neon-purple);
            color: var(--neon-purple);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            transition: 0.3s;
            background: transparent;
            cursor: pointer;
        }

        .neon-button:hover {
            background: var(--neon-purple);
            color: #fff;
            box-shadow: 0 0 30px var(--neon-purple);
        }

        @media (max-width: 600px) {
            .glitch-title {
                font-size: 2rem;
            }

            .answer-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1 class="glitch-title">BASICS ARENA</h1>
            <p class="subtitle">Level 0: Hardware & OS training</p>
        </header>

        <main id="game-container" class="quiz-card terror-frame">
            <div id="quiz-view">
                <div class="progress-bar">
                    <div id="progress-fill"></div>
                </div>
                <p id="question-text" class="question-text">Initializing...</p>
                <div id="answer-grid" class="answer-grid"></div>
            </div>

            <div id="result-view" class="result-screen">
                <h2 style="font-family: 'Orbitron';">TRAINING COMPLETE</h2>
                <div id="final-score" class="score-value">0</div>
                <p>DATA SYNC: <span id="sync-status">STABLE</span></p>
                <button onclick="location.reload()" class="neon-button">RE-RUN DRILL</button>
                <a href="index.html" class="neon-button"
                    style="border-color: var(--neon-blue); color: var(--neon-blue); margin-left: 1rem;">RETURN TO
                    ARENA</a>
            </div>
        </main>
    </div>

    <script>
        const questions = [
            {
                q: "What is the physical part of a computer called?",
                a: ["Software", "Hardware", "Operating System", "Network"],
                correct: 1
            },
            {
                q: "Which of these is the main 'brain' that processes all data?",
                a: ["Monitor", "Mouse", "CPU", "Keyboard"],
                correct: 2
            },
            {
                q: "What does RAM stand for?",
                a: ["Read Access Memory", "Random Access Memory", "Remote Area Mode", "Remote Application Monitor"],
                correct: 1
            },
            {
                q: "Which device is used to highlight items on the screen (pointing device)?",
                a: ["Printer", "Scanner", "Mouse", "Speaker"],
                correct: 2
            },
            {
                q: "Which software manages all other programs on a computer?",
                a: ["Word", "Chrome", "Operating System", "Photoshop"],
                correct: 2
            }
        ];

        let currentIdx = 0;
        let score = 0;

        function renderQuestion() {
            const q = questions[currentIdx];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('progress-fill').style.width = ((currentIdx + 1) / questions.length * 100) + '%';

            const grid = document.getElementById('answer-grid');
            grid.innerHTML = '';

            q.a.forEach((ans, i) => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.innerText = ans;
                btn.onclick = () => selectAnswer(i);
                grid.appendChild(btn);
            });
        }

        function selectAnswer(idx) {
            const correct = questions[currentIdx].correct;
            const buttons = document.querySelectorAll('.answer-btn');

            buttons.forEach(b => b.disabled = true);

            if (idx === correct) {
                buttons[idx].classList.add('correct');
                score += 20;
            } else {
                buttons[idx].classList.add('wrong');
                buttons[correct].classList.add('correct');
            }

            setTimeout(() => {
                currentIdx++;
                if (currentIdx < questions.length) {
                    renderQuestion();
                } else {
                    showResults();
                }
            }, 1000);
        }

        function showResults() {
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';
            document.getElementById('final-score').innerText = score + '%';

            const status = document.getElementById('sync-status');
            if (score >= 80) {
                status.innerText = "ELITE";
                status.style.color = "var(--neon-green)";
            } else if (score >= 40) {
                status.innerText = "STABLE";
                status.style.color = "var(--neon-blue)";
            } else {
                status.innerText = "CRITICAL";
                status.style.color = "var(--neon-red)";
            }
        }

        // Init
        setTimeout(renderQuestion, 500);
    </script>
</body>

</html>
